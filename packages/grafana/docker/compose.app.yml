volumes:
  ${@NAMETAG}:
    driver: local

services:
  ${@NAMETAG}:
    image: grafana/grafana:11.6.1
    restart: always
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USERNAME}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - ${@NAMETAG}:/var/lib/grafana